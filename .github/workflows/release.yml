name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Build linux/amd64 + linux/arm64 with checksums
        run: make checksums VERSION=${{ steps.ver.outputs.version }}

      - name: List artifacts
        run: ls -l dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/acmesh-ui-linux-amd64
            dist/acmesh-ui-linux-arm64
            dist/SHA256SUMS
